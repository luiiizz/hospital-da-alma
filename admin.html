<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Administração</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container py-5">

    <h1 class="mb-4">
      Lista de Inscrições
    </h1>

    <table class="table table-bordered table-striped">

      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Endereço</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Data</th>
        </tr>
      </thead>

      <tbody id="tabela"></tbody>

    </table>

  </div>

  <script>

    async function carregarInscricoes() {

      try {

        const response = await fetch(
          "https://api-hospital-da-alma.onrender.com/inscricao"
        );

        const data = await response.json();

        const tabela =
          document.getElementById("tabela");

        tabela.innerHTML = "";

        data.forEach(item => {

          tabela.innerHTML += `
            <tr>
              <td>${item.id}</td>
              <td>${item.nome}</td>
              <td>${item.endereco}</td>
              <td>${item.telefone}</td>
              <td>${item.email}</td>
              <td>
                ${new Date(item.data_cadastro)
                  .toLocaleString("pt-BR")}
              </td>
            </tr>
          `;

        });

      } catch (error) {

        console.error(error);

        alert("Erro ao carregar inscrições");

      }

    }

    carregarInscricoes();

  </script>

</body>
</html>
